<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Glory Gym – AI-Inspired Workout Suggester by TECHFORGE | CODE-V. Get personalized workout plans based on your fitness level, goals, and equipment." />
  <title>Glory Gym | TECHFORGE | CODE-V – Smart Sweat. Engineered Results.</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Noscript Fallback -->
  <noscript>
    <div class="noscript-msg">
      <h2>⚡ Enable JavaScript for Glory Gym</h2>
      <p>This application requires JavaScript to generate your personalised workout plan.</p>
    </div>
  </noscript>

  <!-- Floating Particles -->
  <div class="particles" aria-hidden="true">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
  </div>

  <!-- ===== HEADER ===== -->
  <header class="brand-header">
    <div class="container position-relative">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
        <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
      </button>
      <div class="brand-logo">TECHFORGE ｜ CODE-V</div>
      <h1 class="brand-sub"><span class="accent">GLORY</span> GYM</h1>
      <p class="brand-tagline">"Smart sweat. Engineered results."</p>
    </div>
  </header>

  <!-- ===== FORM SECTION ===== -->
  <main class="form-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">
          <div class="glass-card p-4 p-md-5">
            <div class="section-title">
              <span class="icon"><i class="bi bi-sliders"></i></span>
              Configure Your Workout
            </div>

            <form id="workoutForm" novalidate>
              <div class="row g-4">

                <!-- Fitness Level -->
                <div class="col-md-6 col-lg-4">
                  <label for="fitnessLevel" class="form-label">Fitness Level</label>
                  <select class="form-select" id="fitnessLevel" required>
                    <option value="Beginner" selected>Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                  </select>
                </div>

                <!-- Primary Goal -->
                <div class="col-md-6 col-lg-4">
                  <label for="primaryGoal" class="form-label">Primary Goal</label>
                  <select class="form-select" id="primaryGoal" required>
                    <option value="Build Muscle" selected>Build Muscle</option>
                    <option value="Lose Fat">Lose Fat</option>
                    <option value="Improve Endurance">Improve Endurance</option>
                    <option value="General Fitness">General Fitness</option>
                  </select>
                </div>

                <!-- Equipment -->
                <div class="col-md-6 col-lg-4">
                  <label for="equipment" class="form-label">Available Equipment</label>
                  <select class="form-select" id="equipment" required>
                    <option value="None" selected>None (Bodyweight)</option>
                    <option value="Dumbbells">Dumbbells / Kettlebells</option>
                    <option value="Full Gym">Full Gym Access</option>
                  </select>
                </div>

                <!-- Duration Slider -->
                <div class="col-md-6 col-lg-4">
                  <label for="duration" class="form-label">Workout Duration</label>
                  <div class="text-center mb-2">
                    <span class="duration-display" id="durationValue">30</span>
                    <span class="duration-unit">min</span>
                  </div>
                  <input type="range" class="form-range" id="duration" min="15" max="60" step="5" value="30" />
                </div>

                <!-- Frequency -->
                <div class="col-md-6 col-lg-4">
                  <label class="form-label">Frequency / Week</label>
                  <div class="freq-group" id="freqGroup" role="radiogroup" aria-label="Workout frequency per week">
                    <button type="button" class="freq-btn" data-freq="2">2<span class="day-label">days</span></button>
                    <button type="button" class="freq-btn active" data-freq="3">3<span class="day-label">days</span></button>
                    <button type="button" class="freq-btn" data-freq="4">4<span class="day-label">days</span></button>
                    <button type="button" class="freq-btn" data-freq="5">5<span class="day-label">days</span></button>
                  </div>
                </div>

                <!-- Age Group (Optional) -->
                <div class="col-md-6 col-lg-4">
                  <label for="ageGroup" class="form-label">Age Group <small class="text-muted">(optional)</small></label>
                  <select class="form-select" id="ageGroup">
                    <option value="18-35" selected>18 – 35</option>
                    <option value="under18">Under 18</option>
                    <option value="36-50">36 – 50</option>
                    <option value="50+">50+</option>
                  </select>
                </div>

              </div>

              <!-- Submit -->
              <div class="text-center mt-4 mt-md-5">
                <button type="submit" class="btn-suggest" id="suggestBtn">
                  <i class="bi bi-lightning-charge-fill"></i>
                  Suggest My Workout
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ===== RESULT SECTION ===== -->
  <section class="result-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">
          <div id="resultContainer" class="hidden"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container d-flex flex-wrap align-items-center justify-content-center gap-2">
      <div class="footer-brand">TECHFORGE ｜ CODE-V</div>
      <p class="footer-copy mb-0">&copy; 2026 TECHFORGE | CODE-V. Developed by Gurupadayya Odeyar.</p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- App JS -->
  <script src="script.js"></script>
</body>
</html>
